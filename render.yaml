services:
  # FastAPI Backend
  - type: web
    name: gps-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gps-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://gps-web.onrender.com,https://assessments.giftpassionstory.com"

  # React Frontend (static site)
  - type: web
    name: gps-web
    env: static
    buildCommand: cd web && npm install && npm run build
    staticPublishPath: web/dist
    envVars:
      - key: VITE_API_URL
        value: "https://gps-api.onrender.com"
    routes:
      - type: rewrite
        source: /(.*)
        destination: /index.html

databases:
  - name: gps-postgres
    databaseName: gps_db
    user: gps_user
    plan: free
